name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package (editable)
        if: ${{ hashFiles('pyproject.toml') != '' }}
        run: python -m pip install -e .

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Validate hero manifest
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          from src.contracts import PlantManifest

          hero = Path('config/plants/hero.yaml')
          if hero.exists():
            PlantManifest.model_validate(yaml.safe_load(hero.read_text(encoding='utf-8')))
            print('hero manifest validated')
          else:
            print('hero manifest not present; skipping validation')
          PY

      - name: Run tests
        run: python -m pytest
